<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Simple line chart with upward trend - represents data patterns -->

  <!-- Y-axis -->
  <line x1="30" y1="25" x2="30" y2="85"
        stroke="#F9DFC1"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- X-axis -->
  <line x1="30" y1="85" x2="95" y2="85"
        stroke="#F9DFC1"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- Y-axis arrow -->
  <path d="M 30 25 L 27 30 M 30 25 L 33 30"
        stroke="#F9DFC1"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- X-axis arrow -->
  <path d="M 95 85 L 90 82 M 95 85 L 90 88"
        stroke="#F9DFC1"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- Upward trend curve (smooth path) -->
  <path d="M 35 75 Q 45 70, 50 65 T 65 55 T 80 40 T 90 30"
        stroke="#F9DFC1"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Data points on the curve -->
  <circle cx="35" cy="75" r="3"
          stroke="#F9DFC1"
          stroke-width="2"
          fill="none"/>

  <circle cx="50" cy="65" r="3"
          stroke="#F9DFC1"
          stroke-width="2"
          fill="none"/>

  <circle cx="65" cy="55" r="3"
          stroke="#F9DFC1"
          stroke-width="2"
          fill="none"/>

  <circle cx="80" cy="40" r="3"
          stroke="#F9DFC1"
          stroke-width="2"
          fill="none"/>

  <circle cx="90" cy="30" r="3"
          stroke="#F9DFC1"
          stroke-width="2"
          fill="none"/>

  <!-- Tick marks on axes -->
  <line x1="27" y1="45" x2="30" y2="45"
        stroke="#F9DFC1"
        stroke-width="1.5"
        stroke-linecap="round"
        opacity="0.5"/>

  <line x1="27" y1="65" x2="30" y2="65"
        stroke="#F9DFC1"
        stroke-width="1.5"
        stroke-linecap="round"
        opacity="0.5"/>

  <line x1="50" y1="85" x2="50" y2="88"
        stroke="#F9DFC1"
        stroke-width="1.5"
        stroke-linecap="round"
        opacity="0.5"/>

  <line x1="70" y1="85" x2="70" y2="88"
        stroke="#F9DFC1"
        stroke-width="1.5"
        stroke-linecap="round"
        opacity="0.5"/>
</svg>
