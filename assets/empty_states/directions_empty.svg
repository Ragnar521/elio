<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Compass rose - represents life direction -->

  <!-- Outer circle -->
  <circle cx="60" cy="60" r="35"
          stroke="#F9DFC1"
          stroke-width="2"
          fill="none"/>

  <!-- Inner circle -->
  <circle cx="60" cy="60" r="5"
          stroke="#F9DFC1"
          stroke-width="2"
          fill="none"/>

  <!-- North arrow (pointing up) -->
  <path d="M 60 25 L 55 40 L 60 35 L 65 40 Z"
        stroke="#F9DFC1"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- North line -->
  <line x1="60" y1="35" x2="60" y2="55"
        stroke="#F9DFC1"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- South arrow (pointing down) -->
  <path d="M 60 95 L 55 80 L 60 85 L 65 80 Z"
        stroke="#F9DFC1"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.5"/>

  <!-- South line -->
  <line x1="60" y1="65" x2="60" y2="85"
        stroke="#F9DFC1"
        stroke-width="2"
        stroke-linecap="round"
        opacity="0.5"/>

  <!-- East arrow (pointing right) -->
  <path d="M 95 60 L 80 55 L 85 60 L 80 65 Z"
        stroke="#F9DFC1"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.5"/>

  <!-- East line -->
  <line x1="65" y1="60" x2="85" y2="60"
        stroke="#F9DFC1"
        stroke-width="2"
        stroke-linecap="round"
        opacity="0.5"/>

  <!-- West arrow (pointing left) -->
  <path d="M 25 60 L 40 55 L 35 60 L 40 65 Z"
        stroke="#F9DFC1"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.5"/>

  <!-- West line -->
  <line x1="55" y1="60" x2="35" y2="60"
        stroke="#F9DFC1"
        stroke-width="2"
        stroke-linecap="round"
        opacity="0.5"/>

  <!-- Diagonal lines (NE, SE, SW, NW) -->
  <line x1="60" y1="60" x2="80" y2="40"
        stroke="#F9DFC1"
        stroke-width="1.5"
        stroke-linecap="round"
        opacity="0.3"/>

  <line x1="60" y1="60" x2="80" y2="80"
        stroke="#F9DFC1"
        stroke-width="1.5"
        stroke-linecap="round"
        opacity="0.3"/>

  <line x1="60" y1="60" x2="40" y2="80"
        stroke="#F9DFC1"
        stroke-width="1.5"
        stroke-linecap="round"
        opacity="0.3"/>

  <line x1="60" y1="60" x2="40" y2="40"
        stroke="#F9DFC1"
        stroke-width="1.5"
        stroke-linecap="round"
        opacity="0.3"/>

  <!-- Cardinal points labels -->
  <text x="60" y="18" text-anchor="middle"
        fill="#F9DFC1"
        font-size="10"
        font-weight="600">N</text>

  <text x="60" y="105" text-anchor="middle"
        fill="#F9DFC1"
        font-size="10"
        font-weight="600"
        opacity="0.5">S</text>

  <text x="103" y="65" text-anchor="middle"
        fill="#F9DFC1"
        font-size="10"
        font-weight="600"
        opacity="0.5">E</text>

  <text x="17" y="65" text-anchor="middle"
        fill="#F9DFC1"
        font-size="10"
        font-weight="600"
        opacity="0.5">W</text>
</svg>
